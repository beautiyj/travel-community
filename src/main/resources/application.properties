# 키/비밀번호는 application-secret.properties에 분리 (gitignore 대상)
spring.profiles.include=secret

spring.application.name=travel
# server.port=80
server.port=9999

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

mybatis.type-aliases-package=com.gnagnoohc.travel
mybatis.mapper-locations=classpath:/mapper/**/*.xml

# Venue photo upload (yun)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
mybatis.configuration.map-underscore-to-camel-case=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/travel?autoReconnect=true&useUnicode=true&characterEncoding=utf-8

# ---------- 서버 주소 (카카오 콜백 URL 생성용, 포트 9999) ----------
app.base-url=http://localhost:9999
